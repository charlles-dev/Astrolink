name: Astrolink CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Go node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: node/go.sum

      - name: Test Go node
        working-directory: node
        run: go test ./...

      - name: Build Go node
        working-directory: node
        run: go build -o /tmp/astrolink-node ./cmd/server

  portal:
    name: Captive portal
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        working-directory: portal
        run: npm ci

      - name: Test portal
        working-directory: portal
        run: npm test

      - name: Check portal
        working-directory: portal
        run: npm run check

      - name: Build portal
        working-directory: portal
        run: npm run build
