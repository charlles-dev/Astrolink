services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: astrolink
      POSTGRES_USER: astrolink
      POSTGRES_PASSWORD: devpassword
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev:/var/lib/postgresql/data
      - ./node/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrolink"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass devredis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: astrolink
      RABBITMQ_DEFAULT_PASS: devrabbit
    ports:
      - "5672:5672"
      - "15672:15672"

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@astrolink.app
      PGADMIN_DEFAULT_PASSWORD: devpassword
    ports:
      - "5050:80"

volumes:
  postgres_dev:
