services:
  node:
    build:
      context: ./node
    container_name: astrolink-node
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://astrolink:${DB_PASSWORD}@postgres:5432/astrolink?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      TZ: ${TIMEZONE:-America/Sao_Paulo}
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/backups:/app/backups
      - ./data/ssh-keys:/app/ssh-keys:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/saude"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15-alpine
    container_name: astrolink-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: astrolink
      POSTGRES_USER: astrolink
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./node/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrolink"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: astrolink-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
